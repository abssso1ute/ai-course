<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Adaptive Navbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<nav class="bg-gray-900 text-white p-4">

    <div class="flex justify-between items-center">

        <div class="text-lg font-bold">MySite</div>

        <button id="menuBtn" class="md:hidden focus:outline-none">
            ☰
        </button>

        <ul id="menu" class="hidden md:flex md:flex-row flex-col gap-4 md:gap-6 absolute md:static top-16 left-0 w-full md:w-auto bg-gray-900 md:bg-transparent p-4 md:p-0">
            <li><a href="#" class="hover:text-blue-400">Главная</a></li>
            <li><a href="#" class="hover:text-blue-400">Блог</a></li>
            <li><a href="#" class="hover:text-blue-400">О нас</a></li>
            <li><a href="#" class="hover:text-blue-400">Контакты</a></li>
        </ul>

    </div>

</nav>

<script>
const btn = document.getElementById('menuBtn');
const menu = document.getElementById('menu');

btn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
});
</script>

</body>
</html>
