<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Product Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">

<div class="max-w-3xl w-full bg-white rounded-2xl shadow-md overflow-hidden flex flex-col md:flex-row transition-shadow duration-300 hover:shadow-xl">

    <div class="md:w-1/2">
        <img src="https://via.placeholder.com/600x400" alt="Product" class="w-full h-full object-cover">
    </div>

    <div class="p-6 md:w-1/2 flex flex-col justify-between">
        
        <div>
            <h2 class="text-2xl font-bold mb-2">Название товара</h2>
            <p class="text-gray-600 mb-4">Краткое описание товара, которое объясняет его основные преимущества и назначение.</p>

            <div class="flex items-center mb-4">
                <span class="text-yellow-400">★★★★★</span>
                <span class="text-gray-500 ml-2">(4.8)</span>
            </div>

            <div class="text-xl font-semibold mb-4">1990 ₽</div>
        </div>

        <button class="bg-blue-500 text-white py-2 px-4 rounded-lg transition-colors duration-300 hover:bg-blue-700">
            В корзину
        </button>

    </div>

</div>

</body>
</html>
