<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary-color: #4f46e5;
    --text-color: #ffffff;
    --radius: 8px;
}

body {
    font-family: Arial;
    padding: 20px;
}

.button {
    background: var(--primary-color);
    color: var(--text-color);
    padding: 12px 20px;
    border: none;
    border-radius: var(--radius);
    font-size: 1rem;
    cursor: pointer;
    width: 100%;
}

@media (min-width: 768px) {
    .button {
        width: auto;
    }
}
</style>
</head>

<body>
<button class="button">Кнопка</button>
</body>
</html>
